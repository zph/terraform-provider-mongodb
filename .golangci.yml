version: "2"

run:
  timeout: 10m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - nakedret
    - misspell

    - unused
    - unconvert
    - unparam
  settings:
    errcheck:
      exclude-functions:
        - github.com/hashicorp/terraform-plugin-sdk/helper/schema.ForceNew
        - github.com/hashicorp/terraform-plugin-sdk/helper/schema.Set
        - fmt.*
        - io.Close
    misspell:
      ignore-words:
        - hdinsight
        - exportfs
